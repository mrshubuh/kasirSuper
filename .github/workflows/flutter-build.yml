name: Flutter Build - kasirSuper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Flutter Version Info
        run: flutter --version

      - name: Fix Kotlin Version in Gradle files
        run: |
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          
          # Patch settings.gradle - kotlin plugin version
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle || true
          sed -i "s/id 'org.jetbrains.kotlin.android' version '[^']*'/id 'org.jetbrains.kotlin.android' version '1.9.22'/" android/settings.gradle || true
          
          # Patch build.gradle - ext.kotlin_version
          sed -i 's/ext.kotlin_version = "[^"]*"/ext.kotlin_version = "1.9.22"/' android/build.gradle || true
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/" android/build.gradle || true
          
          echo "=== AFTER PATCH settings.gradle ==="
          cat android/settings.gradle
          echo "=== AFTER PATCH build.gradle ==="
          cat android/build.gradle

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run Tests
        run: flutter test
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasirSuper-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7